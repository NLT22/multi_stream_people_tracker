# =============================================================================
# MMPTracking_short Baseline — NvDCF realtime simple, 2026-06-04
# =============================================================================
# Frozen baseline before geometry-assignment experiments.
#
# Anchor metrics on training/test scenes:
#   lobby_0           Global IDF1 0.7649, MOTA 90.1, Pred IDs 10
#   industry_safety_0 Global IDF1 0.8301, MOTA 91.8, Pred IDs 8
#   office_0          Global IDF1 0.8192, MOTA 86.4, Pred IDs 9
#   cafe_shop_0       Global IDF1 0.7684, MOTA 95.1, Pred IDs 9
#
# This baseline keeps online merge off and uses geometry as assignment weight
# only; ReID threshold/stickiness gates remain appearance-based.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_accuracy_mmp_recall_all.yaml
  tracker_width: 640
  tracker_height: 384

display:
  osd_enabled: true
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: false
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000
  no_display: false

reid:
  similarity_threshold: 0.62
  gallery_max_age: 1800
  assignment_max_candidates: 60

  id_stickiness: true
  id_switch_margin: 0.10
  ambiguous_match_rejection: false
  match_ambiguity_margin: 0.00

  global_merge: false
  global_merge_threshold: 0.76
  global_merge_min_embeddings: 6
  global_merge_margin: 0.04
  global_merge_interval: 30
  global_merge_max_candidates: 40

  tracklet_embedding: true
  tracklet_embedding_interval: 5
  tracklet_window: 6
  tracklet_min_embeddings: 3
  tracklet_max_age: 1800
  embedding_quality_gate: true

  geometry_assignment_mode: weight_only
  geometry_reid_margin: 1.00
