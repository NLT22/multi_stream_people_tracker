%YAML:1.0
# =============================================================================
# NvDCF Tracker Config — MMP 20-camera throughput + ReID export (REALTIME GALLERY)
# =============================================================================
# Same aggressive DCF compute reduction as nvdcf_perf_mmp_20cam.yaml, but adds a
# minimal ReID branch so the Python CrossCameraGalleryProbe can match across
# cameras IN REALTIME (no nearline pass).
#
# Cost control vs nvdcf_accuracy_mmp_recall.yaml:
#   featureImgSizeLevel: 1     (12x12 DCF, was 5)        -> ~80% less DCF compute
#   useColorNames: 0           (geometry-only appearance)
#   maxTargetsPerStream: 40    (was 220)
#   reidExtractionInterval: 10 (run Swin ReID 1/11 frames, was 5)
#   reidType: 2 (REASSOC) but no heavy enableReAssoc trajectory block
#   outputReidTensor: 1        (gallery reads these embeddings)
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.12

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 40
  minIouDiff4NewTarget: 0.60
  minTrackerConfidence: 0.35
  probationAge: 2
  maxShadowTrackingAge: 30
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  minMatchingScore4Overall: 0.35
  minMatchingScore4SizeSimilarity: 0.30
  minMatchingScore4Iou: 0.20
  minMatchingScore4VisualSimilarity: 0.40
  matchingScoreWeight4VisualSimilarity: 0.30
  matchingScoreWeight4SizeSimilarity: 0.35
  matchingScoreWeight4Iou: 0.50
  tentativeDetectorConfidence: 0.18
  minMatchingScore4TentativeIou: 0.35

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 1.5
  processNoiseVar4Size: 1.3
  processNoiseVar4Vel: 0.03
  measurementNoiseVar4Detector: 3.0
  measurementNoiseVar4Tracker: 8.0

VisualTracker:
  visualTrackerType: 2
  useColorNames: 0
  useHog: 1
  useHighPrecisionFeature: 0
  featureImgSizeLevel: 1
  featureFocusOffsetFactor_y: -0.20
  filterLr: 0.075
  filterChannelWeightsLr: 0.10
  gaussianSigma: 0.75

ReID:
  reidType: 2

  batchSize: 16
  workspaceSize: 1000
  reidFeatureSize: 256
  reidHistorySize: 100
  inferDims: [3, 256, 128]
  networkMode: 1
  reidExtractionInterval: 10

  inputOrder: 0
  colorFormat: 0
  offsets: [123.6750, 116.2800, 103.5300]
  netScaleFactor: 0.01735207
  keepAspc: 1
  useVPICropScaler: 1
  addFeatureNormalization: 0
  outputReidTensor: 1

  onnxFile: "models/reid/swin_tiny_mmp_reid.onnx"
  modelEngineFile: ""
