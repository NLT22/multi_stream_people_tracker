# =============================================================================
# NvDCF Tracker Config — Performance Mode
# =============================================================================
# NvDCF (NVIDIA Discriminative Correlation Filter) is a GPU-accelerated
# visual tracker. It uses appearance features to keep track of objects even
# when the detector misses them for a few frames.
#
# "Performance mode" = faster, slightly less stable IDs under occlusion.
# For a more stable ID at the cost of speed, see nvdcf_accuracy.yaml.
#
# How nvtracker uses this file:
#   pipeline.add("nvtracker", "tracker", {
#       "ll-lib-file":    ".../libnvds_nvmultiobjecttracker.so",
#       "ll-config-file": "configs/tracker/nvdcf_perf.yaml",
#       "tracker-width":  640,
#       "tracker-height": 384,
#   })
#
# Reference: LEARNING_NOTES.md § Tracker algorithms
# =============================================================================

BaseConfig:
  # Minimum detection confidence to start tracking a new target.
  # Below this, detections are ignored by the tracker.
  # TODO: Lower to 0.1 to track more objects; raise to 0.4 for fewer false tracks
  minDetectorConfidence: 0.2

TargetManagement:
  # Maximum number of tracked objects per stream.
  # Keep reasonable to avoid VRAM pressure on 3050Ti.
  maxTargetsPerStream: 50

  # Unclip bounding boxes that go partially outside the frame
  enableBboxUnClipping: true

  # How many frames a lost target is kept before its ID is removed
  # TODO: Increase to 60 for longer re-identification window
  maxShadowTrackingAge: 30

DataAssociator:
  # "dcf" = use the NvDCF correlation filter for association
  # Alternative: "iou" → see iou.yaml
  attributeName: dcf

  # Minimum IOU overlap to match a detection to an existing track
  minMatchingScore4Overall: 0.0
  minMatchingScore4VisualSimilarity: 0.2

VisualTracker:
  # Color names feature: robust to lighting changes
  useColorNames: true

  # HOG (Histogram of Oriented Gradients): robust to pose changes
  useHOG: true

  # Feature image size level (1=small/fast, 5=large/accurate)
  # Level 3 is a good balance for real-time on 3050Ti
  # TODO: Try level 2 for more FPS, level 4 for better ID stability
  featureImgSizeLevel: 3

  # Search region padding: how far to look for a moved object
  SearchRegionPaddingScale: 1.25
