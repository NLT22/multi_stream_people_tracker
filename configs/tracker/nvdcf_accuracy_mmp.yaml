%YAML:1.0
# =============================================================================
# NvDCF Tracker Config — Accuracy Mode + MMP Swin-Tiny ReID
# =============================================================================
# A/B test against NvDeepSORT MMP.
#
# NvDCF should be strong for local single-camera tracking because it keeps a
# visual correlation tracker and can re-associate short local tracklets.  This
# config also exports MMP fine-tuned ReID tensors so the Python gallery and
# offline merge can still do cross-camera Global ID assignment.
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.18

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 200
  minIouDiff4NewTarget: 0.55
  minTrackerConfidence: 0.45
  probationAge: 4
  maxShadowTrackingAge: 180
  earlyTerminationAge: 1

TrajectoryManagement:
  enableReAssoc: 1
  minMatchingScore4Overall: 0.75
  minTrackletMatchingScore: 0.40
  minMatchingScore4ReidSimilarity: 0.35
  matchingScoreWeight4TrackletSimilarity: 0.75
  matchingScoreWeight4ReidSimilarity: 0.45
  minTrajectoryLength4Projection: 34
  prepLength4TrajectoryProjection: 58
  trajectoryProjectionLength: 33
  maxAngle4TrackletMatching: 67
  minSpeedSimilarity4TrackletMatching: 0.057
  minBboxSizeSimilarity4TrackletMatching: 0.101
  maxTrackletMatchingTimeSearchRange: 27
  trajectoryProjectionProcessNoiseScale: 0.0100
  trajectoryProjectionMeasurementNoiseScale: 100
  trackletSpacialSearchRegionScale: 0.0100
  reidExtractionInterval: 5

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  minMatchingScore4Overall: 0.35
  minMatchingScore4SizeSimilarity: 0.45
  minMatchingScore4Iou: 0.10
  minMatchingScore4VisualSimilarity: 0.62
  matchingScoreWeight4VisualSimilarity: 0.85
  matchingScoreWeight4SizeSimilarity: 0.20
  matchingScoreWeight4Iou: 0.20
  tentativeDetectorConfidence: 0.30
  minMatchingScore4TentativeIou: 0.35

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 6497.75
  processNoiseVar4Size: 1541.86
  processNoiseVar4Vel: 8035.86
  measurementNoiseVar4Detector: 100.0
  measurementNoiseVar4Tracker: 883.58

VisualTracker:
  visualTrackerType: 1
  useColorNames: 1
  useHog: 1
  featureImgSizeLevel: 5
  featureFocusOffsetFactor_y: -0.105
  filterLr: 0.015
  filterChannelWeightsLr: 0.050
  gaussianSigma: 0.450

ReID:
  # 2 = ReAssoc only: NvDCF remains the local visual tracker, while ReID helps
  # recover local IDs and is exported for the Python MTMC gallery.
  reidType: 2

  batchSize: 16
  workspaceSize: 1000
  reidFeatureSize: 256
  reidHistorySize: 100
  inferDims: [3, 256, 128]
  networkMode: 1

  inputOrder: 0
  colorFormat: 0
  offsets: [123.6750, 116.2800, 103.5300]
  netScaleFactor: 0.01735207
  keepAspc: 1
  useVPICropScaler: 1
  addFeatureNormalization: 0
  outputReidTensor: 1

  onnxFile: "models/reid/swin_tiny_mmp_reid.onnx"
  modelEngineFile: ""
