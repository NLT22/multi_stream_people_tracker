# =============================================================================
# NvDeepSORT Tracker Config — with Re-ID (resnet50_market1501)
# =============================================================================
# DeepStream builds the TRT engine automatically from the .etlt file on first
# run (~1 min). Subsequent runs load the .engine file from models/reid/.
#
# Model: nvidia/tao/reidentificationnet:deployable_v1.0
#   resnet50 trained on Market-1501 re-identification dataset
#   Input: RGB 256x128, output: 256-dim L2-normalised embedding
#
# First run: DeepStream decodes the etlt + builds engine (~1 min)
# Engine saved to: models/reid/resnet50_market1501.etlt_b16_gpu0_fp16.engine
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.2

TargetManagement:
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 50
  minIouDiff4NewTarget: 0.9
  minTrackerConfidence: 0.4
  probationAge: 2
  maxShadowTrackingAge: 60
  earlyTerminationAge: 1

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  thresholdMahalanobis: 12.0
  minMatchingScore4Overall: 0.1
  minMatchingScore4SizeSimilarity: 0.3
  minMatchingScore4Iou: 0.2
  minMatchingScore4ReidSimilarity: 0.5
  matchingScoreWeight4SizeSimilarity: 0.7
  matchingScoreWeight4Iou: 0.5
  matchingScoreWeight4ReidSimilarity: 0.3
  tentativeDetectorConfidence: 0.2
  minMatchingScore4TentativeIou: 0.2

StateEstimator:
  stateEstimatorType: 2
  noiseWeightVar4Loc: 0.05
  noiseWeightVar4Vel: 0.004
  useAspectRatio: 1

ReID:
  reidType: 1    # 0=DUMMY 1=DEEP(NvDeepSORT) 2=reassoc 3=both

  batchSize: 16
  workspaceSize: 1000
  reidFeatureSize: 256      # resnet50_market1501 output dim
  reidHistorySize: 100
  inferDims: [3, 256, 128]  # CHW — model expects 256x128 RGB crops
  networkMode: 1            # 0=fp32 1=fp16 2=int8

  inputOrder: 0             # 0=NCHW
  colorFormat: 0            # 0=RGB
  offsets: [123.6750, 116.2800, 103.5300]  # ImageNet mean subtraction
  netScaleFactor: 0.01735207
  keepAspc: 1
  useVPICropScaler: 1
  addFeatureNormalization: 1
  outputReidTensor: 1    # Export ReID embedding to obj_meta.tensor_items so probe can read it

  # DeepStream reads etlt, decodes with key, builds TRT engine on first run.
  # Paths are relative to the working directory (project root).
  tltEncodedModel: "models/reid/resnet50_market1501.etlt"
  tltModelKey: "nvidia_tao"
  modelEngineFile: "models/reid/resnet50_market1501.etlt_b16_gpu0_fp16.engine"
