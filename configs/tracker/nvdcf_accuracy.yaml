%YAML:1.0
# =============================================================================
# NvDCF Tracker Config — Accuracy Mode (Tuned for People Tracking)
# =============================================================================
# Tuned parameters adapted from the NVIDIA reference project:
#   deepstream-tracker-3d-multi-view/config_templates/config_tracker_2d.yml
#
# Key differences vs nvdcf_perf.yaml:
#   - Higher maxShadowTrackingAge (150 vs 30): keeps lost IDs longer for
#     re-association after occlusion
#   - Trajectory-based re-association: matches tracklets by motion prediction
#     so IDs survive brief disappearances (walking behind a pillar, etc.)
#   - Stricter state estimator (stateEstimatorType 1 = KF, vs 0 = simple)
#   - Heavier visual features (featureImgSizeLevel 5 vs 3) = better accuracy,
#     higher GPU cost; reduce to 3 if FPS drops below acceptable level
#
# USE WHEN: You need stable person IDs across occlusions and re-entries
#           within the same camera view. For cross-camera matching, see M8.
#
# HOW TO USE:
#   python milestones/05_multi_stream_tracking.py \
#       --tracker-config configs/tracker/nvdcf_accuracy.yaml
# =============================================================================

BaseConfig:
  # Minimum detection confidence to accept a new track.
  # 0.027 matches the reference project's threshold for PeopleNet detections.
  # Raise to 0.3–0.4 if too many false positive tracks appear.
  minDetectorConfidence: 0.027

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 200

  # Minimum IOU difference a new detection must have vs existing tracks.
  # Higher = less likely to create a duplicate track for the same person.
  minIouDiff4NewTarget: 0.227

  # Minimum tracker confidence to keep a track alive (0–1).
  minTrackerConfidence: 0.696

  # Frames before a tentative track is confirmed as real.
  probationAge: 1

  # Frames a lost track is kept before its ID is deleted.
  # 150 = ~5 seconds at 30fps. Longer window → IDs survive longer occlusions.
  # TODO: Reduce to 60 if too many zombie tracks appear in your scene.
  maxShadowTrackingAge: 150

  earlyTerminationAge: 1

TrajectoryManagement:
  # Re-associate tracklets across brief disappearances using motion prediction.
  # Requires maxShadowTrackingAge to be large enough to buffer the gap.
  enableReAssoc: 1

  # Minimum score to accept a tracklet re-association match.
  minMatchingScore4Overall: 0.935
  minTrackletMatchingScore: 0.294

  # Trajectory projection: predict where a lost person will reappear.
  minTrajectoryLength4Projection: 34
  prepLength4TrajectoryProjection: 58
  trajectoryProjectionLength: 33

  # Geometric constraints for tracklet matching.
  maxAngle4TrackletMatching: 67
  minSpeedSimilarity4TrackletMatching: 0.057
  minBboxSizeSimilarity4TrackletMatching: 0.101
  maxTrackletMatchingTimeSearchRange: 27

  trajectoryProjectionProcessNoiseScale: 0.0100
  trajectoryProjectionMeasurementNoiseScale: 100
  trackletSpacialSearchRegionScale: 0.0100

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 0

  minMatchingScore4Overall: 0.667
  minMatchingScore4SizeSimilarity: 0.672
  minMatchingScore4Iou: 0.139
  minMatchingScore4VisualSimilarity: 0.052

  matchingScoreWeight4SizeSimilarity: 0.105
  matchingScoreWeight4Iou: 0.784
  matchingScoreWeight4VisualSimilarity: 0.929

  tentativeDetectorConfidence: 0.702
  minMatchingScore4TentativeIou: 0.177

StateEstimator:
  # stateEstimatorType 1 = Kalman Filter (more accurate velocity estimate).
  # 0 = simple exponential smoothing (used in nvdcf_perf.yaml).
  stateEstimatorType: 1

  # Kalman filter noise parameters (tuned by reference project for people).
  processNoiseVar4Loc: 6497.75
  processNoiseVar4Vel: 8035.86
  measurementNoiseVar4Detector: 100.0
  measurementNoiseVar4Tracker: 883.58

VisualTracker:
  # visualTrackerType 1 = NvDCF with correlation filter (standard).
  # 2 = NvDCF with improved features (more accurate, higher cost).
  visualTrackerType: 1

  useColorNames: 1
  useHog: 1

  # Level 5 = largest feature window (best accuracy).
  # TODO: Reduce to 3 or 4 if FPS drops significantly on RTX 3050Ti.
  featureImgSizeLevel: 5

  # Focus tracking slightly above the bounding box center — reduces ground
  # plane influence for standing people.
  featureFocusOffsetFactor_y: -0.105

  filterLr: 0.025
  filterChannelWeightsLr: 0.095
  gaussianSigma: 0.450
