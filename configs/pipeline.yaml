# =============================================================================
# Multi-Stream People Tracker — Main ReID Pipeline Config
# =============================================================================
# This file is the default control panel for:
#
#   python -m src.main
#
# CLI flags can still override these values for quick tests.
# =============================================================================

# ── Source Mode ──────────────────────────────────────────────────────────────
# Choose ONE mode by setting source_mode. The path for each mode is below.
#
#   video_files  → read from a text file listing video paths/URIs (start here)
#   folder_input → scan a folder for all video files automatically
#   rtsp_cameras → read RTSP camera stream URLs from a text file
#
source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

# ── Detection ────────────────────────────────────────────────────────────────
# Switch model by changing config_file path.
# Default: YOLO11n COCO — person class id is inferred as 0.
#
# First run builds a TensorRT engine next to the selected model (~1-3 min).
# Subsequent runs load that .engine file (fast).
#
detection:
  enabled: true

  # ── Model options ─────────────────────────────────────────────────────────
  # YOLO11n (default):
  #   80 COCO classes, person class id inferred from configs/labels/coco_labels.txt
  #   Requires models/yolov11/yolo11n.onnx and the YOLOv8/v11 custom parser .so.
  config_file: configs/models/nvinfer_yolov11_people.yml

  # YOLOv8n stable baseline:
  # config_file: configs/models/nvinfer_yolov8_people.yml

  # TrafficCamNet (bundled with DeepStream):
  #   4 classes: vehicle(0), bicycle(1), PERSON(2), road_sign(3)
  #   person class id is inferred from configs/labels/trafficcamnet_labels.txt
  # config_file: configs/models/nvinfer_trafficcamnet.yml

  # PeopleNet v2.6.3 (recommended for people tracking, download required):
  #   3 classes: PERSON(0), bag(1), face(2)  — bag+face filtered automatically
  #   person class id is inferred from configs/labels/peoplenet_labels.txt
  #   Download: bash scripts/download_peoplenet.sh
  # config_file: configs/models/nvinfer_peoplenet.yml

# ── Tracker ──────────────────────────────────────────────────────────────────
# nvtracker assigns a local object_id per camera. The main ReID gallery then
# links those local IDs into cross-camera Global IDs.
#
# Switch tracker by changing config_file:
#   nvdcf_perf.yaml     → NvDCF visual tracker, fast (recommended start)
#   nvdcf_accuracy.yaml → NvDCF local tracking + ReID tensor export
#                          (useful A/B test for warehouse overlap)
#   iou.yaml            → IoU tracker (CPU, simplest, good for learning)
#   nvdeepsort_reid.yaml → NvDeepSORT + ResNet50 ReID
#   nvdeepsort_reid_swin.yaml → NvDeepSORT + Swin-Tiny ReID (default MTMC demo)
#
tracker:
  enabled: true
  config_file: configs/tracker/nvdeepsort_reid_swin.yaml
  # config_file: configs/tracker/nvdcf_accuracy.yaml   # local-tracking A/B test
  # config_file: configs/tracker/iou.yaml              # simplest, try first
  # config_file: configs/tracker/nvdeepsort_reid.yaml  # ResNet50 ReID
  tracker_width: 640    # should match nvinfer input width
  tracker_height: 384   # should match nvinfer input height

# ── Display ──────────────────────────────────────────────────────────────────
display:
  osd_enabled: true       # draw bounding boxes + labels (Milestone 6+)
  tiled_display: true     # NxN grid layout (Milestone 7+); false = last stream only
  tile_width: 1280        # per-tile width in pixels
  tile_height: 720        # per-tile height in pixels

# ── Performance (tuned for RTX 3050Ti, 4 GB VRAM) ────────────────────────────
# batch_size: how many frames processed together in one GPU pass.
#   - null means auto = number of input streams (recommended).
#   - Use a fixed value only for benchmarking or engine-cache reuse.
#   - Keep <= 8 on 4 GB VRAM with FP16.
#   - src/main.py writes the matching runtime nvinfer config automatically.
#
batch_size:
gpu_id: 0

# ── Runtime Options Used By src.main ─────────────────────────────────────────
runtime:
  # Quick test limiter. null = load all resolved sources/videos.
  # Example: 4 means use only the first 4 entries from video_files.txt/folder.
  max_sources:

  # Recommended when debugging source-id mismatch or running many streams:
  # gallery runs before tiling, so camera_id is read directly from DeepStream.
  pretiler: false

  # Headless benchmark mode. Skips the tiler and implies pretiler in code.
  no_tiler: false

  # Draw recent local-track paths as colored OSD lines for tracker debugging.
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24

  # Set to a path to save annotated output, or override with --save-video.
  # Example: output/videos/reid_demo.mp4
  save_video:
  record_bitrate: 8000000
  no_display: false
