# =============================================================================
# MMPTracking_short Realtime Preset — 20 camera, REALTIME cross-camera ReID
# =============================================================================
# Decoupled-ReID architecture for 20cam @ 10 FPS/cam WITH realtime Global ID:
#   - detector: YOLO11n 416px, interval 4 (cheap)
#   - tracker:  NvDCF perf, reidType:0 (NO in-tracker ReID -> ~22 FPS/cam ceiling)
#   - ReID:     secondary nvinfer (SGIE) extracts Swin embeddings as tensor-meta
#   - gallery:  CrossCameraGalleryProbe reads SGIE tensors -> realtime Global IDs
#
# Why: in-tracker ReID (reidType:2) collapses 20cam throughput 22->5 FPS/cam
# regardless of tuning; the SGIE batches all crops in one TRT call instead.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp_416_iv4.yml
  reid_sgie_config: configs/models/nvinfer_reid_swin_sgie.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_perf_mmp_20cam.yaml
  tracker_width: 640
  tracker_height: 384
  sub_batches: "5:5:5:5"

display:
  osd_enabled: false
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: true
  no_display: true
  no_sync: true
  disable_gallery: false      # REALTIME gallery ON (reads SGIE embeddings)
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000

reid:
  id_stickiness: true
  ambiguous_match_rejection: true
  global_merge: false
  tracklet_embedding: true
  embedding_quality_gate: true
