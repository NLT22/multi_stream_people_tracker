# =============================================================================
# nvinfer Config — PeopleNet v2.6.3 (Primary Detector, FP16)
# =============================================================================
# PeopleNet is a ResNet34-based detector from NVIDIA TAO, purpose-built for
# person detection. It outperforms TrafficCamNet for people tracking because:
#   - Higher recall at low confidence thresholds
#   - Better recall under partial occlusion
#   - Fine-tuned on diverse pedestrian datasets (Market, CUHK, DukeMTMC)
#
# MODEL CLASSES (3 total):
#   0 = Person   ← we keep only this
#   1 = Bag      ← filtered out via filter-out-class-ids
#   2 = Face     ← filtered out via filter-out-class-ids
#
# ⚠ CLASS ID DIFFERENCE vs TrafficCamNet:
#   TrafficCamNet: Person = class_id 2
#   PeopleNet:     Person = class_id 0
#   → Milestones 04-08 infer this automatically from the label file.
#
# DOWNLOAD:
#   The ONNX is NOT bundled with DeepStream. Download from NGC:
#     scripts/download_peoplenet.sh
#   Saves to: models/peoplenet/resnet34_peoplenet.onnx
#
# Reference: deepstream-tracker-3d-multi-view/config_templates/config_pgie_peoplenet.txt
# =============================================================================

property:
  gpu-id: 0

  # ── Model files ──────────────────────────────────────────────────────────────
  # Path relative to THIS config file (configs/models/).
  # The ONNX must be downloaded first via scripts/download_peoplenet.sh.
  onnx-file: ../../models/peoplenet/resnet34_peoplenet.onnx

  # Engine: built on first run, saved next to the ONNX file.
  # Delete to force rebuild (e.g. after changing batch-size or network-mode).
  model-engine-file: ../../models/peoplenet/resnet34_peoplenet.onnx_b4_gpu0_fp16.engine

  # 3 classes: Person (0), Bag (1), Face (2)
  labelfile-path: ../labels/peoplenet_labels.txt

  # ── Preprocessing ────────────────────────────────────────────────────────────
  # PeopleNet trained on ImageNet-normalized input: pixel / 255 ≈ 0.00392
  net-scale-factor: 0.0039215697906911373

  # Fixed input resolution: 3×544×960 (CHW). Static ONNX — no dynamic shapes.
  # infer-dims is still specified explicitly to match the reference project.
  infer-dims: 3;544;960

  # Color format: RGB (same as training data)
  model-color-format: 0

  # ── Inference settings ────────────────────────────────────────────────────────
  # batch-size: one frame per stream per inference call.
  # Must match the number of active streams and pipeline.yaml batch_size.
  batch-size: 4

  # FP16: half the VRAM of FP32, negligible accuracy loss on RTX 3050Ti.
  # 0=FP32, 1=INT8 (needs calibration file), 2=FP16
  network-mode: 2

  # 3 classes total in the model output
  num-detected-classes: 3

  # Filter out Bag (1) and Face (2) — we only care about Person (0).
  # This removes them from NvDsObjectMeta so probes never see class_id 1 or 2.
  filter-out-class-ids: 1;2

  # Run inference every frame (0 = no skipping).
  # With nvtracker: try interval: 2 to skip frames — tracker fills the gaps.
  interval: 0

  # Unique ID for this inference engine in the pipeline.
  gie-unique-id: 1

  # Primary detector: processes full frames
  process-mode: 1

  # 0 = detector (not classifier or segmentation)
  network-type: 0

  # cluster-mode 2 = NMS (correct for PeopleNet v2.6.3 standard ONNX).
  # PeopleNet outputs raw anchor predictions → NMS clusters them.
  # Do NOT change to 4 (None) unless using a post-NMS model variant.
  cluster-mode: 2

  # Do not scale or pad input — use exact 544×960 resize
  maintain-aspect-ratio: 0

# ── Per-class NMS thresholds ──────────────────────────────────────────────────
# These apply globally after model output (before filter-out-class-ids removes
# Bag/Face). Lower pre-cluster-threshold = more Person detections but more
# false positives in crowded scenes.
#
# TODO: Tune pre-cluster-threshold for your scene:
#   0.1 = maximum recall (crowded hallways, partial occlusion)
#   0.4 = precision-first (open spaces, clean detections)
class-attrs-all:
  pre-cluster-threshold: 0.2
  topk: 20
  nms-iou-threshold: 0.5

# Per-class override for Person (class 0): slightly stricter NMS to reduce
# overlapping boxes when people stand close together.
class-attrs-0:
  pre-cluster-threshold: 0.4
  topk: 20
  nms-iou-threshold: 0.5
