# =============================================================================
# nvinfer Config — YOLO11n fine-tuned on MTA (1 class: person, FP16)
# =============================================================================
# Same architecture as YOLO11n COCO but fine-tuned on MTA_ext_short.
# nc=1 (person only) → no filter-out-class-ids needed.
#
# Build ONNX:
#   python scripts/mta_to_yolo.py --mta-root dataset/mta/MTA_ext_short
#   python scripts/train_yolo_mta.py --epochs 50
#   # → models/yolov11/yolo11n_mta.onnx copied automatically
#
# Run pipeline:
#   python -m src.main \
#       --mta-dataset dataset/mta/MTA_ext_short/test \
#       --nvinfer-config configs/models/nvinfer_yolov11_mta.yml \
#       --export-predictions output/eval/mta_finetuned \
#       --no-sync
# =============================================================================

property:
  gpu-id: 0

  # ── Model files ──────────────────────────────────────────────────────────────
  onnx-file: ../../models/yolov11/yolo11n_mta.onnx
  model-engine-file: ../../models/yolov11/yolo11n_mta.onnx_b4_gpu0_fp16.engine

  # Single-class label file (person only, class_id=0)
  labelfile-path: ../labels/people_only_labels.txt

  # ── Preprocessing ─────────────────────────────────────────────────────────────
  net-scale-factor: 0.0039215697906911373   # 1/255
  model-color-format: 0                     # RGB
  maintain-aspect-ratio: 1
  symmetric-padding: 1
  infer-dims: 3;640;640

  # ── Inference settings ────────────────────────────────────────────────────────
  batch-size: 4
  network-mode: 2        # FP16
  num-detected-classes: 1

  interval: 0
  gie-unique-id: 1
  process-mode: 1
  network-type: 0        # detector

  # YOLO11 pre-NMS output: [batch, 4+nc, 8400] = [batch, 5, 8400] with nc=1
  cluster-mode: 2        # NMS

  # ── Custom bbox parser ────────────────────────────────────────────────────────
  custom-lib-path: ../../models/yolov8/libnvds_infercustomparser_yolov8.so
  parse-bbox-func-name: NvDsInferParseYoloV8
  output-blob-names: output0

# ── Per-class NMS thresholds ─────────────────────────────────────────────────
class-attrs-all:
  pre-cluster-threshold: 0.25
  topk: 20
  nms-iou-threshold: 0.45

class-attrs-0:
  pre-cluster-threshold: 0.25
  topk: 20
  nms-iou-threshold: 0.45
