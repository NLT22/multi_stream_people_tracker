# =============================================================================
# nvinfer Config — TrafficCamNet (Primary Detector)
# =============================================================================
# TrafficCamNet is a ResNet18 detector bundled with DeepStream.
# It detects 4 classes: vehicle(0), bicycle(1), person(2), road_sign(3).
# We filter for class_id=2 (person) in our probe callbacks.
#
# YAML format rules (DeepStream 9.0):
#   - Top-level section MUST be named "property:" (not "model:")
#   - Use "key: value" with a space after the colon
#   - Indentation matters — use 2 spaces
#
# See: LEARNING_NOTES.md § nvinfer config sections
# =============================================================================

property:
  gpu-id: 0

  # ── Model files ────────────────────────────────────────────────────────────
  # Paths are relative to THIS config file (configs/models/).
  # ../../models/trafficcamnet/ → project_root/models/trafficcamnet/
  onnx-file: ../../models/trafficcamnet/resnet18_trafficcamnet_pruned.onnx

  # Engine: built on first run, saved next to the ONNX file.
  # Delete to force rebuild (e.g. after changing batch-size or network-mode).
  model-engine-file: ../../models/trafficcamnet/resnet18_trafficcamnet_pruned.onnx_b4_gpu0_fp16.engine

  # Label file — RELATIVE TO THIS CONFIG FILE (configs/models/)
  # ../labels/ resolves to configs/labels/ correctly
  labelfile-path: ../labels/trafficcamnet_labels.txt

  # ── Preprocessing ──────────────────────────────────────────────────────────
  # Scale factor: pixel values → model input range
  # TrafficCamNet expects [0, 1] floats: scale = 1/255 ≈ 0.00392
  net-scale-factor: 0.0039215697906911373

  # Model input resolution (H×W) — must match ONNX model's expected input
  infer-dims: 3;544;960

  # ── Inference settings ─────────────────────────────────────────────────────
  # batch-size: how many frames per inference call
  # Must match pipeline.yaml batch_size AND number of streams
  batch-size: 4

  # network-mode precision:
  #   0 = FP32 (most accurate, most VRAM)
  #   1 = INT8 (fastest, needs calibration data)
  #   2 = FP16 (recommended for RTX 3050Ti — half VRAM, minimal accuracy loss)
  #
  # TODO (M3 Exercise 2): Try network-mode: 0 (FP32) and compare VRAM with `nvidia-smi`.
  # NOTE: Changing network-mode changes the engine filename (_fp16 vs _fp32).
  #       Delete the old .engine file next to the model before switching.
  #         FP32 (mode 0): VRAM ~665MB, FPS ~61-62
  #         FP16 (mode 2): VRAM ~615MB, FPS ~120 
  network-mode: 2

  # 4 video - net
  num-detected-classes: 4

  # Keep only Person (class 2). Vehicle, Bicycle, and RoadSign are removed
  # before metadata reaches OSD/probes.
  filter-out-class-ids: 0;1;3

  # interval: run inference every N+1 frames (0=every frame, 1=every other frame)
  # TODO (M3 Exercise 3): Try interval: 2 → inference runs every 3rd frame.
  # At M3 (no tracker) this makes boxes flicker. At M4+ nvtracker fills gaps.
  interval: 0

  # gie-unique-id: identifier for this inference engine
  # Primary detector = 1. Secondary GIE would use 2, 3, etc.
  gie-unique-id: 1

  # process-mode: 1=primary (full frame), 2=secondary (on detected objects)
  process-mode: 1

  # network-type: 0=detector, 1=classifier, 2=segmentation
  network-type: 0

# ── Per-class NMS thresholds ──────────────────────────────────────────────────
# Applied after network output to filter weak/overlapping detections.
# Lower pre-cluster-threshold = more detections (but more false positives).
#
# TODO (M3 Exercise 1): Change pre-cluster-threshold → 0.5 (fewer boxes) or 0.1 (noisy).
# Lower value = more detections (higher recall, more false positives).
class-attrs-all:
  pre-cluster-threshold: 0.2
  topk: 20 # max detections per class (after NMS)
  nms-iou-threshold: 0.5
