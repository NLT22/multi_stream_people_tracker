# =============================================================================
# MMPTracking_short Realtime Preset — 20 camera, 416×416 detector input
# =============================================================================
# Same as pipeline_mmp_realtime_20cam.yaml but uses 416×416 detector input
# for ~40% less inference compute. Use when 640px doesn't reach 10 FPS/cam.
# Trade-off: slightly lower recall on small/distant persons.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp_416_iv4.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_perf_mmp_20cam.yaml
  tracker_width: 640
  tracker_height: 384
  sub_batches: "5:5:5:5"

display:
  osd_enabled: false
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: true
  no_display: true
  no_sync: true
  disable_gallery: true
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000

reid:
  id_stickiness: false
  ambiguous_match_rejection: false
  global_merge: false
  tracklet_embedding: false
  embedding_quality_gate: false
