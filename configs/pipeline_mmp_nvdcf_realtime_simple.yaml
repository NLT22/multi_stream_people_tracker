# =============================================================================
# MMPTracking_short Preset — YOLO MMP + NvDCF MMP + simple realtime gallery
# =============================================================================
# Purpose: realtime display/export with fewer gallery decision layers.
#
# Keep:
#   - NvDCF local tracker
#   - tracklet embedding average
#   - Hungarian one-to-one assignment inside each camera
#   - ID stickiness for live local tracks
#   - quality gate for gallery memory updates
#
# Remove from realtime path:
#   - online duplicate Global-ID merge: too little future evidence, caused split
#     and unstable remaps compared with offline/nearline merge.
#   - ambiguity rejection: conservative guard that often creates extra GIDs in
#     MMP when several people have close ReID scores.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_accuracy_mmp_recall.yaml
  tracker_width: 640
  tracker_height: 384

display:
  osd_enabled: true
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: false
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000
  no_display: false

reid:
  similarity_threshold: 0.66
  gallery_max_age: 1800
  assignment_max_candidates: 60

  id_stickiness: true
  id_switch_margin: 0.10
  ambiguous_match_rejection: false
  match_ambiguity_margin: 0.00

  global_merge: false
  global_merge_threshold: 0.76
  global_merge_min_embeddings: 6
  global_merge_margin: 0.04
  global_merge_interval: 30
  global_merge_max_candidates: 40

  tracklet_embedding: true
  tracklet_embedding_interval: 5
  tracklet_window: 6
  tracklet_min_embeddings: 3
  tracklet_max_age: 1800
  embedding_quality_gate: true
