# =============================================================================
# MMPTracking_short Preset — YOLO MMP + Swin-Tiny ReID MMP
# =============================================================================
# Use with:
#   python -m src.main --config configs/pipelines/pipeline_mmp.yaml \
#     --mmp-short-dataset dataset/MMPTracking_short:lobby_0 \
#     --no-display --no-sync --export-predictions output/eval/mmp_lobby0
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdeepsort_reid_swin_mmp.yaml
  tracker_width: 640
  tracker_height: 384

display:
  osd_enabled: true
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: false
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000
  no_display: false

reid:
  # Realtime gallery stays precision-first. The MMP ReID embeddings are softer,
  # but going too low reuses one GID for multiple simultaneous same-camera
  # tracks and hurts IDF1 badly.
  similarity_threshold: 0.68
  gallery_max_age: 1800
  assignment_max_candidates: 80

  id_stickiness: true
  id_switch_margin: 0.12
  ambiguous_match_rejection: true
  match_ambiguity_margin: 0.06

  # Keep online merge off for MMP eval. Do duplicate repair offline, where the
  # full tracklet evidence and same-camera temporal conflicts are available.
  global_merge: false
  global_merge_threshold: 0.86
  global_merge_min_embeddings: 6
  global_merge_margin: 0.08
  global_merge_interval: 30
  global_merge_max_candidates: 40

  tracklet_embedding: true
  tracklet_embedding_interval: 5
  tracklet_window: 8
  tracklet_min_embeddings: 3
  tracklet_max_age: 1800
  embedding_quality_gate: true
