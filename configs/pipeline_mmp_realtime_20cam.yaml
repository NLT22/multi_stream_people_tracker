# =============================================================================
# MMPTracking_short Realtime Preset — 20 camera target
# =============================================================================
# Goal: maximize realtime throughput. This path keeps detector + lightweight
# NvDCF local tracking online; Global-ID/ReID repair should run sparse/nearline.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp_iv4.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_perf_mmp_lite.yaml
  tracker_width: 640
  tracker_height: 384
  # Split the 20-source tracker batch into separate low-level tracker instances.
  # Tune with benchmark_fps_ablation if a target machine behaves differently.
  sub_batches: "5:5:5:5"

display:
  osd_enabled: false
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: true
  no_display: true
  no_sync: true
  disable_gallery: true
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000

reid:
  # Deliberately disabled for the realtime path.
  id_stickiness: false
  ambiguous_match_rejection: false
  global_merge: false
  tracklet_embedding: false
  embedding_quality_gate: false
