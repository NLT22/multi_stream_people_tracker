_BASE_: ../../third_party/fast-reid/configs/Base-bagtricks.yml

MODEL:
  BACKBONE:
    WITH_IBN: True
    PRETRAIN: True
  HEADS:
    # Keep DeepStream-friendly 256-d embedding, matching the old Swin model.
    EMBEDDING_DIM: 256
    NECK_FEAT: before
  LOSSES:
    NAME: ("CrossEntropyLoss", "TripletLoss",)
    TRI:
      HARD_MINING: True

DATASETS:
  NAMES: ("Market1501",)
  TESTS: ("Market1501",)

DATALOADER:
  SAMPLER_TRAIN: NaiveIdentitySampler
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  AMP:
    ENABLED: True
  OPT: Adam
  MAX_EPOCH: 60
  BASE_LR: 0.00035
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_NORM: 0.0005
  IMS_PER_BATCH: 64
  SCHED: MultiStepLR
  STEPS: [ 25, 45 ]
  GAMMA: 0.1
  WARMUP_ITERS: 500
  CHECKPOINT_PERIOD: 10

TEST:
  EVAL_PERIOD: 5
  IMS_PER_BATCH: 128

OUTPUT_DIR: output/fastreid_mmp/bagtricks_R50_ibn
