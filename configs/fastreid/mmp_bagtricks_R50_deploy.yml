_BASE_: ../../third_party/fast-reid/configs/Base-bagtricks.yml

MODEL:
  BACKBONE:
    # Keep this deployment config IBN-free.  FastReID R50-IBN exports, but the
    # resulting ONNX uses Split/InstanceNorm patterns that currently break
    # TensorRT execution inside DeepStream's NvMultiObjectTracker.
    WITH_IBN: False
    PRETRAIN: True
  HEADS:
    # Match the current DeepStream ReID feature size used by the Swin baseline.
    EMBEDDING_DIM: 256
    NECK_FEAT: before
  LOSSES:
    NAME: ("CrossEntropyLoss", "TripletLoss",)
    TRI:
      HARD_MINING: True

DATASETS:
  NAMES: ("Market1501",)
  TESTS: ("Market1501",)

DATALOADER:
  SAMPLER_TRAIN: NaiveIdentitySampler
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  AMP:
    ENABLED: True
  OPT: Adam
  MAX_EPOCH: 80
  BASE_LR: 0.00035
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_NORM: 0.0005
  IMS_PER_BATCH: 128
  SCHED: MultiStepLR
  STEPS: [ 35, 60 ]
  GAMMA: 0.1
  WARMUP_ITERS: 1000
  CHECKPOINT_PERIOD: 10

TEST:
  EVAL_PERIOD: 5
  IMS_PER_BATCH: 256

OUTPUT_DIR: output/fastreid_mmp/bagtricks_R50_deploy
