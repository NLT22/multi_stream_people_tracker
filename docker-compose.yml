services:
  tracker:
    build: .
    image: multi_stream_people_tracker:latest
    gpus: all
    network_mode: host
    stdin_open: true
    tty: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]

    environment:
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility,graphics

    volumes:
      - ./configs:/app/configs
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./models:/app/models
      - ./dataset:/app/dataset:ro
      - ./output:/app/output

      # Optional local video directory mounted at /videos.
      - ${VIDEO_DIR:-./dataset/MMPTracking_short}:/videos:ro

      # Uncomment only for display output.
      # - ${X11_SOCKET_DIR:-/tmp/.X11-unix}:/tmp/.X11-unix

    command:
      - python3
      - -m
      - src.main
      - --config
      - configs/pipelines/pipeline_mmp_nvdcf_online_sgie_reid0.yaml
      - --sources
      - configs/sources/video_files_docker.txt
      - --no-display
      - --no-sync
