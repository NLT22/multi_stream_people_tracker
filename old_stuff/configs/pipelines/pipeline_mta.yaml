# =============================================================================
# Pipeline preset — MTA dataset (MTA_ext_short, 6 cameras, 41fps, GTA V)
#
# Usage:
#   python -m src.main --config configs/pipelines/pipeline_mta.yaml \
#       --mta-dataset dataset/mta/MTA_ext_short/test \
#       [--export-predictions output/eval/mta_run1] \
#       [--no-sync]
# =============================================================================

detection:
  config_file: configs/models/nvinfer_yolov11_mta.yml   # fine-tuned on MTA, nc=1

tracker:
  config_file: configs/tracker/nvdeepsort_reid_swin.yaml

display:
  tile_width:  960
  tile_height: 540

gpu_id: 0

runtime:
  show_trajectories: true
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24

# ── ReID / Gallery tuning ─────────────────────────────────────────────────────
# MTA differences vs mtmc_4cam:
#   - 6 cameras, crowded outdoor, GTA V synthetic
#   - person_id consistent across cameras (good for cross-cam ReID eval)
#   - 41fps source → more frames per tracklet → can be stricter on min_embeddings
#   - Larger crowds → lower similarity threshold risks FP merges → keep at 0.68
#   - gallery_max_age higher to survive longer cross-camera gaps
#
# Start with these values and tune based on IDF1/IDS from src.eval.metrics.
reid:
  # Matching
  similarity_threshold: 0.68
  assignment_max_candidates: 80

  # ID stability — same as mtmc4cam, MTA has similar overlap patterns
  id_stickiness: true
  id_switch_margin: 0.12
  ambiguous_match_rejection: true
  match_ambiguity_margin: 0.06

  # Global ID merge — keep realtime conservative.  Online frame-level merge
  # caused false merges on MTA; use src.eval.offline_merge for delayed
  # tracklet-level correction after exporting predictions.
  global_merge: false
  global_merge_threshold: 0.74     # slightly lower than mtmc4cam (0.76) for more merges
  global_merge_min_embeddings: 5   # lower: 41fps builds up embeddings faster
  global_merge_margin: 0.04
  global_merge_interval: 5
  global_merge_max_candidates: 80

  # Tracklet embedding — at 41fps, longer history useful
  tracklet_embedding: true
  tracklet_embedding_interval: 8   # sample less often (41fps → still 5fps effective)
  tracklet_window: 10              # more embeddings per tracklet at 41fps
  tracklet_min_embeddings: 4       # slightly higher: more frames available
  tracklet_max_age: 2500           # longer: MTA has longer inter-camera gaps

  # Gallery — longer to survive 6-cam gaps
  gallery_max_age: 2500

  # Quality gate
  embedding_quality_gate: true
