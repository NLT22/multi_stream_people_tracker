# Retail 6-cam config for RTX 3050Ti — ReID disabled, nearline handles cross-cam matching
%YAML:1.0
BaseConfig:
  minDetectorConfidence: 0.12

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 120
  minIouDiff4NewTarget: 0.50
  minTrackerConfidence: 0.35
  probationAge: 4
  maxShadowTrackingAge: 240
  earlyTerminationAge: 1

TrajectoryManagement:
  enableReAssoc: 0

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  minMatchingScore4Overall: 0.32
  minMatchingScore4SizeSimilarity: 0.42
  minMatchingScore4Iou: 0.08
  minMatchingScore4VisualSimilarity: 0.58
  matchingScoreWeight4VisualSimilarity: 0.85
  matchingScoreWeight4SizeSimilarity: 0.20
  matchingScoreWeight4Iou: 0.20
  tentativeDetectorConfidence: 0.22
  minMatchingScore4TentativeIou: 0.30

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 6497.75
  processNoiseVar4Size: 1541.86
  processNoiseVar4Vel: 8035.86
  measurementNoiseVar4Detector: 100.0
  measurementNoiseVar4Tracker: 883.58

VisualTracker:
  visualTrackerType: 1
  useColorNames: 1
  useHog: 1
  featureImgSizeLevel: 4
  filterLr: 0.015
  gaussianSigma: 0.450

ReID:
  reidType: 0
