%YAML:1.0
# =============================================================================
# NvDeepSORT Tracker Config — MMP variant
# =============================================================================
# Kalman (REGULAR) + cascaded appearance matching, using our MMP Swin-Tiny ReID.
# Alternative to NvDCF: no correlation-filter visual tracker; association is
# Mahalanobis-gated motion + deep ReID cosine. maxShadowTrackingAge raised so a
# target survives occlusion / brief exits and re-acquires its ID (re-entry).
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.12

TargetManagement:
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 220
  minIouDiff4NewTarget: 0.9847
  minTrackerConfidence: 0.35
  probationAge: 2
  maxShadowTrackingAge: 240
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  thresholdMahalanobis: 12.1875
  minMatchingScore4Overall: 0.1794
  minMatchingScore4SizeSimilarity: 0.3291
  minMatchingScore4Iou: 0.2364
  minMatchingScore4ReidSimilarity: 0.5
  matchingScoreWeight4SizeSimilarity: 0.7178
  matchingScoreWeight4Iou: 0.4551
  matchingScoreWeight4ReidSimilarity: 0.6
  tentativeDetectorConfidence: 0.2479
  minMatchingScore4TentativeIou: 0.2376

StateEstimator:
  stateEstimatorType: 2
  noiseWeightVar4Loc: 0.0503
  noiseWeightVar4Vel: 0.0037
  useAspectRatio: 1

ReID:
  reidType: 1
  batchSize: 16
  workspaceSize: 1000
  reidFeatureSize: 256
  reidHistorySize: 100
  inferDims: [3, 256, 128]
  networkMode: 1
  inputOrder: 0
  colorFormat: 0
  offsets: [123.6750, 116.2800, 103.5300]
  netScaleFactor: 0.01735207
  keepAspc: 1
  useVPICropScaler: 1
  addFeatureNormalization: 1
  outputReidTensor: 1
  onnxFile: "models/reid/swin_tiny_mmp_reid_all.onnx"
  modelEngineFile: ""
