# =============================================================================
# NvDeepSORT Tracker Config — ReID Transformer Swin-Tiny
# =============================================================================
# Model: nvidia/tao/reidentificationnet_transformer  (Swin-Tiny deployable)
#   swin_tiny_patch4_window7_224 backbone
#   Deployable file: swin_tiny_market1501_aicity156_featuredim256.onnx
#   Input : RGB 384x128 (HxW), output: 256-dim embedding (NOT L2-normalised)
#   Market-1501: mAP 93.8% / rank-1 95.6%
#
# DIFFERENCES vs resnet50_market1501 (nvdeepsort_reid.yaml):
#   inferDims       : [3,256,128] -> [3,384,128]   (taller transformer crop)
#   preprocessing   : mean/std = 0.5  ->  netScaleFactor=1/127.5,
#                     offsets=[127.5,127.5,127.5]
#   model           : .etlt (encoded) -> .onnx (plain) via onnxFile
#   (reidFeatureSize stays 256 — the Swin-Tiny deployable is the featuredim256
#    variant; only Swin-Base ships a 1024-dim version.)
#
# VERIFY the ONNX input shape after download (sources disagree 384x128 vs
# 256x128). inferDims MUST match it:
#   python3 -c "import onnx; m=onnx.load('models/reid/swin_tiny_market1501_aicity156_featuredim256.onnx'); print(m.graph.input[0])"
#
# DeepStream builds the TRT engine on first run (~1-2 min), saved next to it.
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.3

TargetManagement:
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 80
  # Lower than 0.9 so a detection heavily overlapping an existing track is not
  # immediately born as a duplicate target during bbox jitter/crossing.
  minIouDiff4NewTarget: 0.65
  # Keep weak tracks alive instead of dropping them too eagerly; DeepSORT will
  # use Kalman prediction + ReID association while in shadow state.
  minTrackerConfidence: 0.35
  # Late activation: avoid confirming one-frame duplicate tracks.
  probationAge: 5
  # ~6s at 30 FPS: lets DeepStream keep/recover the same local ID through short
  # exits, occlusions, and detector misses before Python sees a new local track.
  maxShadowTrackingAge: 180
  earlyTerminationAge: 1

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  # Use the Kalman-PREDICTED position for association (not last-known). This
  # keeps the correct ID on a person while they pass behind/through another.
  usePrediction4Assoc: 1
  thresholdMahalanobis: 8.0
  minMatchingScore4Overall: 0.28
  minMatchingScore4SizeSimilarity: 0.35
  minMatchingScore4Iou: 0.10
  minMatchingScore4ReidSimilarity: 0.78  # precision-first: reject weak appearance matches
  # When two people overlap, IOU+size are ambiguous → let appearance (ReID)
  # dominate the association score.
  matchingScoreWeight4SizeSimilarity: 0.20
  matchingScoreWeight4Iou: 0.10
  matchingScoreWeight4ReidSimilarity: 1.00
  tentativeDetectorConfidence: 0.35
  minMatchingScore4TentativeIou: 0.35

StateEstimator:
  stateEstimatorType: 2
  noiseWeightVar4Loc: 0.05
  noiseWeightVar4Vel: 0.004
  useAspectRatio: 1

ReID:
  reidType: 1    # 0=DUMMY 1=DEEP(NvDeepSORT) 2=reassoc 3=both

  batchSize: 16
  workspaceSize: 1000
  reidFeatureSize: 256      # Swin-Tiny deployable = featuredim256 variant
  reidHistorySize: 100
  inferDims: [3, 256, 128]  # CHW — verify against the ONNX input (see header)
  networkMode: 1            # 0=fp32 1=fp16 2=int8

  inputOrder: 0             # 0=NCHW
  colorFormat: 0            # 0=RGB
  # pixel_mean=pixel_std=0.5 on [0,1] input  ->  y = (x - 127.5) / 127.5
  offsets: [127.5, 127.5, 127.5]
  netScaleFactor: 0.0078431373
  keepAspc: 1
  addFeatureNormalization: 1   # raw transformer output is NOT L2-normalised
  outputReidTensor: 1          # export embedding so the gallery probe can read it

  # Plain ONNX (not an encoded .etlt) — no tltModelKey needed.
  onnxFile: "models/reid/swin_tiny_market1501_aicity156_featuredim256.onnx"
  modelEngineFile: "models/reid/swin_tiny_market1501_aicity156_featuredim256.onnx_b16_gpu0_fp16.engine"
