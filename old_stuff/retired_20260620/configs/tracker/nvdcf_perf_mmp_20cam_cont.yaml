%YAML:1.0
# =============================================================================
# NvDCF Tracker Config — MMP 20-camera throughput
# =============================================================================
# Aggressive compute reduction for 20-cam @ 10 FPS/cam target.
# Changes vs nvdcf_perf_mmp_lite.yaml:
#   featureImgSizeLevel: 1  (12×12 px, was 2=18×18 → ~55% less DCF compute)
#   useColorNames: 0        (drop 10-channel appearance, use geometry only)
#   maxTargetsPerStream: 40 (indoor scenes rarely exceed 30 people/cam)
#   maxShadowTrackingAge: 30 (shorter shadow to reduce active target workload)
# Tracking quality is lower than lite — use nearline MTMC repair for ReID.
# =============================================================================

BaseConfig:
  minDetectorConfidence: 0.12

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 60
  minIouDiff4NewTarget: 0.60
  minTrackerConfidence: 0.35
  probationAge: 3
  maxShadowTrackingAge: 90
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1
  minMatchingScore4Overall: 0.35
  minMatchingScore4SizeSimilarity: 0.30
  minMatchingScore4Iou: 0.20
  minMatchingScore4VisualSimilarity: 0.40
  matchingScoreWeight4VisualSimilarity: 0.30
  matchingScoreWeight4SizeSimilarity: 0.35
  matchingScoreWeight4Iou: 0.50
  tentativeDetectorConfidence: 0.18
  minMatchingScore4TentativeIou: 0.35

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 1.5
  processNoiseVar4Size: 1.3
  processNoiseVar4Vel: 0.03
  measurementNoiseVar4Detector: 3.0
  measurementNoiseVar4Tracker: 8.0

VisualTracker:
  visualTrackerType: 2
  useColorNames: 0
  useHog: 1
  useHighPrecisionFeature: 0
  featureImgSizeLevel: 1
  featureFocusOffsetFactor_y: -0.20
  filterLr: 0.075
  filterChannelWeightsLr: 0.10
  gaussianSigma: 0.75
