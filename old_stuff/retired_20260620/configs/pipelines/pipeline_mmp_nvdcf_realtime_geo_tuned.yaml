# =============================================================================
# MMPTracking_short Candidate — NvDCF realtime + guarded geometry assignment
# =============================================================================
# Geometry is useful when calibration exists, but should not override appearance
# globally.  This preset keeps ReID as the gate and lets geometry reorder only
# candidates whose ReID scores are close to the best ReID candidate.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp.yml

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_accuracy_mmp_recall.yaml
  tracker_width: 640
  tracker_height: 384

display:
  osd_enabled: true
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: false
  show_trajectories: false
  trajectory_history: 96
  trajectory_sample_interval: 20
  trajectory_max_segments: 24
  save_video:
  record_bitrate: 8000000
  no_display: false

reid:
  similarity_threshold: 0.62
  gallery_max_age: 1800
  assignment_max_candidates: 60

  id_stickiness: true
  id_switch_margin: 0.10
  ambiguous_match_rejection: false
  match_ambiguity_margin: 0.00

  global_merge: false
  global_merge_threshold: 0.76
  global_merge_min_embeddings: 6
  global_merge_margin: 0.04
  global_merge_interval: 30
  global_merge_max_candidates: 40

  tracklet_embedding: true
  tracklet_embedding_interval: 5
  tracklet_window: 6
  tracklet_min_embeddings: 3
  tracklet_max_age: 1800
  embedding_quality_gate: true

  geometry_assignment_mode: close_reid_only
  geometry_reid_margin: 0.08
