# =============================================================================
# 20-camera ACCURATE online-throughput benchmark
# =============================================================================
# Matches the REAL online perception+ReID GPU path (unlike the realtime preset):
#   - detector EVERY frame (interval:0, nvinfer_yolov11_mmp.yml)
#   - accuracy/recall NvDCF tracker WITH in-tracker Swin ReID extraction
#     (reidType:2, 256-d FP16, reidExtractionInterval:5)
# Cross-camera (gallery) is left OFF on purpose: in our architecture the
# cross-camera stage is buffered near-offline on CPU (~25x realtime, async),
# NOT on the GPU critical path. So this measures the true GPU online ceiling.
# =============================================================================

source_mode: video_files

source_configs:
  video_files:  configs/sources/video_files.txt
  folder_input: configs/sources/folder_input.yaml
  rtsp_cameras: configs/sources/rtsp_cameras.txt

detection:
  enabled: true
  config_file: configs/models/nvinfer_yolov11_mmp.yml      # interval:0 (every frame)

tracker:
  enabled: true
  config_file: configs/tracker/nvdcf_accuracy_mmp_recall.yaml   # Swin ReID extraction ON
  tracker_width: 640
  tracker_height: 384
  sub_batches: "5:5:5:5"

display:
  osd_enabled: false
  tiled_display: true
  tile_width: 1280
  tile_height: 720

batch_size:
gpu_id: 0

runtime:
  max_sources:
  pretiler: false
  no_tiler: true
  no_display: true
  no_sync: true
  disable_gallery: true        # cross-camera is CPU/async (buffered), not GPU path
  show_trajectories: false
  save_video:
